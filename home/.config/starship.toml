# The minimal, blazing-fast, and infinitely customizable prompt
# https://starship.rs

# カスタムフォーマットを利用
format = '''[┌ ](bold green)$all[└](bold green)$character'''

# starship が現在のディレクトリのファイルをチェックするのを10ミリ秒待ちます
scan_timeout = 10

# プロンプトの前の空行を追加
add_newline = true

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'


